title: "C5's Blog"
description: >-
  个人博客 — 关于 AI、技术与思想的记录
baseurl: ""
url: "https://c5-jpg.github.io"
timezone: Asia/Shanghai
lang: zh-CN

author:
  name: C5
  email: ""

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      read_time: true
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md